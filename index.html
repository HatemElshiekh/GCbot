<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cryo — Gulf Cryo AI Champion</title>
<style>
  :root {
    --gc-blue:#365888; --gc-blue-deep:#2a4670; --gc-blue-light:#6181B4;
    --gc-orange:#F96E46; --gc-grey:#979AAB; --gc-grey-light:#D6DCE2;
    --bg:#f4f7fb; --panel:#ffffff; --panel-border:#e2e8f1;
    --text:#1d2a3d; --text-dim:#6b7a90;
    --stage-dark:#0c1320;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; overflow-x:hidden; }
  .app { display:grid; grid-template-columns:1fr 1fr; max-width:1300px; margin:0 auto; min-height:100vh; }

  /* ---------- STAGE ---------- */
  .stage { position:relative; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:40px 30px; background:var(--bg); }
  .brand { position:absolute; top:26px; left:30px; z-index:5; }
  .brand img { height:42px; width:auto; display:block; }

  /* dark panel behind Cryo so the image's black bg blends in */
  .avatar-wrap { position:relative; display:flex; align-items:center; justify-content:center; margin-top:18px; }
  .aura { position:absolute; width:380px; height:380px; border-radius:50%; top:50%; left:50%; transform:translate(-50%,-54%); background:radial-gradient(circle, rgba(97,129,180,.22), transparent 70%); filter:blur(12px); z-index:0; transition:all .4s ease; }
  .listen-ring { position:absolute; z-index:1; width:300px; height:300px; border-radius:50%; border:3px solid var(--gc-orange); top:50%; left:50%; transform:translate(-50%,-56%) scale(.8); opacity:0; }
  .avatar { position:relative; z-index:2; display:block; width:auto; height:480px; transform-origin:bottom center; animation:breathe 4.5s ease-in-out infinite; filter:drop-shadow(0 24px 30px rgba(54,88,136,.28)); }

  .status-pill { margin-top:26px; background:var(--panel); border:1px solid var(--panel-border); padding:9px 20px; border-radius:999px; font-size:13px; display:flex; align-items:center; gap:10px; z-index:3; box-shadow:0 4px 14px rgba(29,42,61,.06); }
  .status-dot { width:9px; height:9px; border-radius:50%; background:var(--gc-grey); transition:background .3s; }
  .tagline { margin-top:14px; color:var(--text-dim); font-size:13px; z-index:3; text-align:center; }
  .tagline strong { color:var(--gc-orange); }

  @keyframes breathe { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-9px)} }
  @keyframes thinkBob { 0%,100%{transform:translateY(0) rotate(-.6deg)} 50%{transform:translateY(-5px) rotate(.6deg)} }
  @keyframes talkNod { 0%,100%{transform:translateY(0)} 25%{transform:translateY(-4px)} 50%{transform:translateY(0)} 75%{transform:translateY(-2px)} }
  @keyframes listenPulse { 0%,100%{transform:translate(-50%,-56%) scale(.8); opacity:.7} 50%{transform:translate(-50%,-56%) scale(1.15); opacity:0} }
  @keyframes auraBreathe { 0%,100%{opacity:.4} 50%{opacity:.8} }
  body[data-state="listening"] .avatar { animation:breathe 3s ease-in-out infinite; }
  body[data-state="listening"] .listen-ring { opacity:1; animation:listenPulse 1.4s ease-out infinite; }
  body[data-state="listening"] .aura { background:radial-gradient(circle, rgba(249,110,70,.4), transparent 70%); animation:auraBreathe 1.4s ease-in-out infinite; }
  body[data-state="listening"] .status-dot { background:var(--gc-orange); }
  body[data-state="thinking"] .avatar { animation:thinkBob 1.1s ease-in-out infinite; }
  body[data-state="thinking"] .aura { animation:auraBreathe 1s ease-in-out infinite; }
  body[data-state="thinking"] .status-dot { background:var(--gc-blue-light); }
  body[data-state="speaking"] .avatar { animation:talkNod .55s ease-in-out infinite; }
  body[data-state="speaking"] .aura { background:radial-gradient(circle, rgba(97,129,180,.5), transparent 70%); animation:auraBreathe .9s ease-in-out infinite; }
  body[data-state="speaking"] .status-dot { background:#3cb371; }

  /* ---------- CHAT ---------- */
  .chat { display:flex; flex-direction:column; background:#fff; border-left:1px solid var(--panel-border); height:100vh; }
  .chat-head { padding:22px 26px; border-bottom:1px solid var(--panel-border); display:flex; align-items:center; justify-content:space-between; }
  .chat-head h1 { font-size:19px; font-weight:700; color:var(--gc-blue); }
  .chat-head h1 small { display:block; font-weight:400; font-size:12px; color:var(--text-dim); margin-top:3px; }
  .voice-toggle { font-size:11px; color:var(--text-dim); display:flex; align-items:center; gap:7px; background:var(--bg); border:1px solid var(--panel-border); padding:7px 12px; border-radius:999px; cursor:pointer; user-select:none; }
  .voice-toggle.on { color:var(--gc-orange); border-color:rgba(249,110,70,.4); }
  .messages { flex:1; overflow-y:auto; padding:24px 26px; display:flex; flex-direction:column; gap:16px; }
  .msg { max-width:82%; padding:13px 16px; border-radius:16px; font-size:14.5px; line-height:1.5; animation:msgIn .25s ease; }
  @keyframes msgIn { from{opacity:0; transform:translateY(8px)} to{opacity:1; transform:none} }
  .msg.bot { background:var(--bg); border:1px solid var(--panel-border); border-bottom-left-radius:5px; align-self:flex-start; color:var(--text); }
  .msg.user { background:linear-gradient(135deg,var(--gc-blue),var(--gc-blue-deep)); color:#fff; border-bottom-right-radius:5px; align-self:flex-end; }
  .msg.bot strong { color:var(--gc-orange); }
  .typing { display:flex; gap:5px; align-self:flex-start; padding:14px 18px; background:var(--bg); border:1px solid var(--panel-border); border-radius:16px; border-bottom-left-radius:5px; }
  .typing span { width:8px; height:8px; border-radius:50%; background:var(--gc-grey); animation:bounce 1.1s infinite; }
  .typing span:nth-child(2){animation-delay:.18s} .typing span:nth-child(3){animation-delay:.36s}
  @keyframes bounce { 0%,60%,100%{transform:translateY(0); opacity:.5} 30%{transform:translateY(-7px); opacity:1} }
  .suggestions { padding:0 26px 12px; display:flex; flex-wrap:wrap; gap:8px; }
  .chip { font-size:12.5px; padding:8px 13px; border-radius:999px; cursor:pointer; background:#eef3fa; border:1px solid #dbe5f1; color:var(--gc-blue); transition:all .2s; }
  .chip:hover { background:rgba(249,110,70,.12); border-color:rgba(249,110,70,.45); color:var(--gc-orange); }
  .composer { padding:16px 22px 22px; border-top:1px solid var(--panel-border); display:flex; gap:12px; align-items:center; }
  .composer input { flex:1; background:var(--bg); border:1px solid var(--panel-border); border-radius:999px; padding:14px 20px; color:var(--text); font-size:14.5px; outline:none; }
  .composer input:focus { border-color:var(--gc-blue-light); }
  .btn { width:50px; height:50px; border-radius:50%; border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:all .2s; }
  .btn svg { width:22px; height:22px; fill:#fff; }
  .btn-mic { background:var(--gc-blue); } .btn-mic:hover { background:var(--gc-blue-light); }
  .btn-mic.recording { background:var(--gc-orange); animation:micPulse 1.2s infinite; }
  @keyframes micPulse { 0%,100%{box-shadow:0 0 0 0 rgba(249,110,70,.5)} 50%{box-shadow:0 0 0 12px rgba(249,110,70,0)} }
  .btn-send { background:var(--gc-orange); } .btn-send:hover { filter:brightness(1.08); }

  @media (max-width:880px){
    .app { grid-template-columns:1fr; }
    .stage { min-height:48vh; padding:64px 16px 16px; }
    .avatar { height:300px; }
    .avatar-wrap { padding:20px 30px 0; }
    .chat { height:auto; min-height:52vh; }
    .messages { max-height:38vh; }
  }
</style>
</head>

const messagesEl=document.getElementById('messages'), inputEl=document.getElementById('input'),
      sendBtn=document.getElementById('sendBtn'), micBtn=document.getElementById('micBtn'),
      suggestionsEl=document.getElementById('suggestions'), voiceToggle=document.getElementById('voiceToggle');
let voiceEnabled=true;
function addMessage(text,who){ const d=document.createElement('div'); d.className='msg '+who; d.innerHTML=text; messagesEl.appendChild(d); messagesEl.scrollTop=messagesEl.scrollHeight; return d; }
function showTyping(){ const t=document.createElement('div'); t.className='typing'; t.id='typing'; t.innerHTML='<span></span><span></span><span></span>'; messagesEl.appendChild(t); messagesEl.scrollTop=messagesEl.scrollHeight; }
function hideTyping(){ const t=document.getElementById('typing'); if(t)t.remove(); }
function renderSuggestions(){ suggestionsEl.innerHTML=''; SUGGESTIONS.forEach(s=>{ const c=document.createElement('div'); c.className='chip'; c.textContent=s; c.onclick=()=>handleUser(s); suggestionsEl.appendChild(c); }); }

/* ---------- 4. TEXT-TO-SPEECH ---------- */
function stripHtml(html){ const tmp=document.createElement('div'); tmp.innerHTML=html.replace(/<br\s*\/?>/g,'. '); return tmp.textContent||tmp.innerText||''; }
let preferredVoice=null;
function pickVoice(){ const v=speechSynthesis.getVoices(); preferredVoice=v.find(x=>/en-GB/i.test(x.lang)&&/male|daniel|arthur/i.test(x.name))||v.find(x=>/en-US/i.test(x.lang)&&/male|guy|david/i.test(x.name))||v.find(x=>/^en/i.test(x.lang))||v[0]; }
if('speechSynthesis'in window){ pickVoice(); speechSynthesis.onvoiceschanged=pickVoice; }
function speak(html,onEnd){ if(!voiceEnabled||!('speechSynthesis'in window)){onEnd&&onEnd();return;} speechSynthesis.cancel(); const u=new SpeechSynthesisUtterance(stripHtml(html)); if(preferredVoice)u.voice=preferredVoice; u.rate=1.02;u.pitch=1.0; u.onstart=()=>setState('speaking'); u.onend=()=>{setState('idle');onEnd&&onEnd();}; speechSynthesis.speak(u); }

/* ---------- 5. MAIN FLOW ---------- */
function handleUser(text){ text=text.trim(); if(!text)return; addMessage(text,'user'); inputEl.value=''; suggestionsEl.innerHTML=''; setState('thinking'); showTyping();
  (async ()=>{
    const a = await getAnswer(text);
    hideTyping();
    addMessage(a,'bot');
    speak(a,()=>renderSuggestions());
    if(!voiceEnabled){ setState('idle'); renderSuggestions(); }
  })();
}
sendBtn.onclick=()=>handleUser(inputEl.value);
inputEl.addEventListener('keydown',e=>{ if(e.key==='Enter')handleUser(inputEl.value); });
voiceToggle.onclick=()=>{ voiceEnabled=!voiceEnabled; voiceToggle.classList.toggle('on',voiceEnabled); voiceToggle.textContent=voiceEnabled?'🔊 Voice on':'🔇 Voice off'; if(!voiceEnabled)speechSynthesis.cancel(); };

/* ---------- 6. VOICE RECOGNITION (hardened) ---------- */
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition = null, recording = false, gotResult = false, starting = false;

function buildRecognition(){
  const r = new SR();
  r.lang = 'en-US';
  r.interimResults = true;
  r.continuous = false;
  r.maxAlternatives = 1;

  r.onstart = () => { recording = true; starting = false; gotResult = false; micBtn.classList.add('recording'); setState('listening'); };
  r.onresult = (e) => {
    let t = '';
    for (let i = e.resultIndex; i < e.results.length; i++) t += e.results[i][0].transcript;
    inputEl.value = t;
    if (t.trim()) gotResult = true;
  };
  r.onerror = (e) => {
    starting = false;
    stopRec();
    if (e.error === 'not-allowed' || e.error === 'service-not-allowed') {
      addMessage("I can't hear you — microphone access is blocked. Click the 🔒/camera icon in your browser's address bar, allow the microphone, then tap the mic again. You can also just type to me.", 'bot');
    } else if (e.error === 'no-speech') {
      addMessage("I didn't catch anything — tap the mic and speak clearly, or type your question below.", 'bot');
    } else if (e.error === 'audio-capture') {
      addMessage("I couldn't find a microphone on this device. You can type to me instead!", 'bot');
    } else if (e.error === 'network') {
      addMessage("Speech recognition needs an internet connection and a secure (https) page. You can type to me in the meantime.", 'bot');
    } else if (e.error !== 'aborted') {
      addMessage("Something interrupted the microphone. Tap it to try again, or type your question.", 'bot');
    }
  };
  r.onend = () => {
    stopRec();
    const f = inputEl.value.trim();
    if (f && gotResult) handleUser(f);
    else setState('idle');
  };
  return r;
}

function stopRec(){ recording = false; micBtn.classList.remove('recording'); if (body.dataset.state === 'listening') setState('idle'); }

micBtn.onclick = async () => {
  // 1. Not supported
  if (!SR) {
    addMessage("Voice input needs Chrome, Edge, or Safari. You can type your question below and I'll still answer out loud!", 'bot');
    return;
  }
  // 2. Already listening -> stop
  if (recording) { try { recognition.stop(); } catch(_){} return; }
  if (starting) return; // debounce double taps

  // 3. Stop Cryo talking so the mic doesn't hear him
  if ('speechSynthesis' in window) speechSynthesis.cancel();

  // 4. Proactively request mic permission (gives a clear prompt + error)
  if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      stream.getTracks().forEach(t => t.stop()); // release immediately; SR opens its own
    } catch (err) {
      addMessage("I need permission to use your microphone. Please allow it in the browser prompt (or the address-bar icon) and tap the mic again. You can also type to me.", 'bot');
      return;
    }
  }

  // 5. Fresh recognition instance each time (avoids stale-state bugs across browsers)
  starting = true;
  recognition = buildRecognition();
  try {
    recognition.start();
  } catch (err) {
    // start() throws if called too soon after a previous session
    starting = false;
    setTimeout(() => { try { recognition = buildRecognition(); recognition.start(); } catch(_){} }, 250);
  }
};

/* ---------- 8. BOOT ---------- */
window.addEventListener('load',()=>{ addMessage(GREETING,'bot'); renderSuggestions(); });

</script>
</body>
</html>
